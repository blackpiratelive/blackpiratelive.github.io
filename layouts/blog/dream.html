{{ define "main" }}
<article class="themed-post themed-post-dream">
  <header class="themed-post-header">
    <p class="theme-kicker">Dream Journal</p>
    <h1>{{ .Title }}</h1>
    {{ partial "blog/post-meta.html" . }}
  </header>

  {{ partial "blog/post-cover.html" . }}

  <div class="themed-post-content">
    {{ partial "blog/post-toc.html" . }}
    {{ .Content }}
  </div>

  {{ partial "blog/post-likes.html" . }}
  {{ partial "blog/post-comments.html" . }}
</article>
{{ end }}
