{{ $src := .Get "src" }}
{{ $path := strings.TrimPrefix "/" $src }}

{{ with resources.Get $path }}
{{ $processed := . }}
{{ if not hugo.IsServer }}
{{ $processed = .Process "q30" }}
{{ end }}
<figure class="post-image">
    <img src="{{ $processed.RelPermalink }}" data-full-src="{{ .RelPermalink }}" {{ with $processed.Width }}width="{{ . }}" {{ end }} {{ with
        $processed.Height }}height="{{ . }}" {{ end }} alt="{{ $.Get "alt" | default .Name }}" loading="lazy" class="thought-image-thumbnail">
    {{ with $.Get "caption" }}
    <figcaption>{{ . }}</figcaption>
    {{ end }}
</figure>
{{ else }}
<p style="color: red;">Image not found: {{ $path }}</p>
{{ end }}
