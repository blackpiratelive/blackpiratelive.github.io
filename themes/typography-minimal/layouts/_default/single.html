{{ define "main" }}
<article class="single-default">
  <header class="single-header">
    <h1 class="single-title">{{ .Title }}</h1>
    <div class="single-meta">
      {{ if not .Date.IsZero }}
      <time class="single-date" datetime="{{ .Date.Format "2006-01-02T15:04:05Z07:00" }}">{{ .Date.Format "January 2, 2006" }}</time>
      {{ end }}
    </div>
  </header>

  <div class="single-content">
    {{ .Content }}
  </div>
</article>
{{ end }}
