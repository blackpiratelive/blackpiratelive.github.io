{{ define "main" }}
<article>
  <h1>{{ .Title }}</h1>
  {{ with .Date }}
  <p class="content-meta"><time datetime="{{ .Format "2006-01-02" }}">{{ .Format "January 2, 2006" }}</time></p>
  {{ end }}
  {{ if .TableOfContents }}
  <section>
    <h2>Contents</h2>
    {{ .TableOfContents }}
  </section>
  {{ end }}
  {{ .Content }}
</article>
{{ end }}
