{{ define "main" }}
{{ $hero := resources.Get "img/me-collage.jpg" }}
{{ $hero = $hero.Resize "1600x webp q80" }}

<main class="w-full">
  <div class="blog-grid">
    <div class="mosaic-box interactive-box box-hero blog-box-hero rounded-xl overflow-hidden relative group bg-zinc-800">
      <div class="absolute inset-0 bg-cover bg-center transition-transform duration-1000 group-hover:scale-105" style="background-image: url('{{ $hero.RelPermalink }}');"></div>
      <div class="absolute inset-0 bg-gradient-to-t from-[#09090b] via-[#09090b]/40 to-transparent"></div>

      <div class="relative h-full flex flex-col justify-end p-6 md:p-10 lg:p-12 z-10">
        <div class="flex items-center gap-3 mb-3 lg:mb-4">
          <span class="bg-rose-600 text-white text-xs font-bold px-3 py-1 rounded-full uppercase tracking-wider">Search</span>
        </div>
        <h1 class="text-3xl sm:text-4xl md:text-5xl lg:text-7xl font-black text-white mb-2 lg:mb-4 tracking-tight max-w-4xl leading-[1.1]">
          Explore the site
        </h1>
      </div>
    </div>

    <div class="left-column blog-left-column no-scrollbar">
      <div class="mosaic-box interactive-box box-nav blog-box-nav bg-zinc-900 rounded-xl p-4 lg:p-6 border border-zinc-800/50 flex flex-col gap-4">
        <nav class="flex flex-row lg:flex-col gap-2 overflow-x-auto no-scrollbar w-full text-xs sm:text-sm font-medium">
          <a href="{{ "/" | relURL }}" class="shrink-0 hover:bg-zinc-800 text-zinc-300 hover:text-white px-4 py-2 lg:py-3 rounded-xl transition flex items-center gap-2 lg:gap-3"><i data-lucide="arrow-left" class="w-4 h-4"></i> Home</a>
          <a href="{{ "/movies/" | relURL }}" class="shrink-0 hover:bg-zinc-800 text-zinc-300 hover:text-white px-4 py-2 lg:py-3 rounded-xl transition flex items-center gap-2 lg:gap-3"><i data-lucide="tv" class="w-4 h-4"></i> Cinema</a>
        </nav>
      </div>
    </div>

    <div class="mosaic-box blog-box-list bg-zinc-900 rounded-xl p-6 sm:p-8 md:p-12 border border-zinc-800/50 w-full min-h-[600px]">
      <div class="relative mb-12">
        <i data-lucide="search" class="absolute left-4 top-1/2 -translate-y-1/2 text-zinc-500 w-6 h-6"></i>
        <input type="text" id="search-input" placeholder="Search movies, shows, blog, thoughts, books, tags..." 
               class="w-full bg-zinc-800/50 border border-zinc-700/50 text-white pl-14 pr-6 py-5 rounded-2xl focus:outline-none focus:ring-2 focus:ring-rose-500/50 focus:border-rose-500 transition-all text-lg font-medium placeholder:text-zinc-500">
      </div>

      <div id="search-results" class="space-y-6">
        <div class="text-center py-20 text-zinc-500">
          <i data-lucide="sparkles" class="w-12 h-12 mx-auto mb-4 opacity-20"></i>
          <p class="text-lg font-medium">Start typing to search...</p>
        </div>
      </div>
    </div>

    <div class="right-column blog-right-column no-scrollbar">
      <div class="mosaic-box interactive-box box-toc blog-box-toc bg-zinc-800/50 rounded-xl p-6 border border-zinc-800/50">
        <h3 class="font-bold text-sm mb-4 text-zinc-300 uppercase tracking-widest flex items-center gap-2"><i data-lucide="info" class="w-4 h-4"></i> Shortcuts</h3>
        <ul class="space-y-3 text-[10px] font-bold uppercase tracking-widest text-zinc-500">
          <li>Press <kbd class="bg-zinc-800 px-1.5 py-0.5 rounded border border-zinc-700 text-zinc-300">ESC</kbd> to clear</li>
        </ul>
      </div>
    </div>
  </div>
</main>

<script src="https://cdn.jsdelivr.net/npm/fuse.js@7.0.0"></script>
<script>
document.addEventListener('DOMContentLoaded', async () => {
  const searchInput = document.getElementById('search-input');
  const searchResults = document.getElementById('search-results');
  let fuse;

  try {
    const response = await fetch('/index.json');
    const data = await response.json();
    
    fuse = new Fuse(data, {
      keys: ['title', 'content', 'description', 'tags', 'section'],
      threshold: 0.3,
      includeMatches: true,
      minMatchCharLength: 2
    });

    searchInput.addEventListener('input', (e) => {
      const query = e.target.value;
      if (query.length < 2) {
        searchResults.innerHTML = `
          <div class="text-center py-20 text-zinc-500">
            <i data-lucide="sparkles" class="w-12 h-12 mx-auto mb-4 opacity-20"></i>
            <p class="text-lg font-medium">Start typing to search...</p>
          </div>
        `;
        return;
      }

      const results = fuse.search(query);
      displayResults(results);
    });

  } catch (err) {
    console.error('Search index failed to load:', err);
    searchResults.innerHTML = '<p class="text-rose-500 text-center">Failed to load search index.</p>';
  }

  function displayResults(results) {
    if (results.length === 0) {
      searchResults.innerHTML = '<p class="text-zinc-500 text-center py-20">No results found for your query.</p>';
      return;
    }

    searchResults.innerHTML = results.map(result => {
      const item = result.item;
      let typeLabel = item.section;
      let colorClass = 'bg-zinc-800 text-zinc-400';
      let icon = 'file-text';

      if (item.section === 'movies') { typeLabel = 'Movie'; colorClass = 'bg-rose-600/20 text-rose-400'; icon = 'film'; }
      if (item.section === 'shows') { typeLabel = 'TV Show'; colorClass = 'bg-blue-600/20 text-blue-400'; icon = 'monitor'; }
      if (item.section === 'blog') { typeLabel = 'Blog'; colorClass = 'bg-emerald-600/20 text-emerald-400'; icon = 'pen-tool'; }
      if (item.section === 'thoughts') { typeLabel = 'Thought'; colorClass = 'bg-amber-600/20 text-amber-400'; icon = 'message-circle'; }

      const title = item.section === 'thoughts' ? (item.content.length > 60 ? item.content.substring(0, 60) + '...' : item.content) : (item.title || 'Untitled');
      const content = item.section === 'thoughts' ? '' : (item.description || '');

      return `
        <a href="${item.url}" class="block group p-6 bg-zinc-800/30 hover:bg-zinc-800/60 border border-zinc-700/30 rounded-2xl transition-all duration-300">
          <div class="flex items-center gap-3 mb-3">
            <span class="${colorClass} text-[10px] font-black uppercase tracking-widest px-2 py-0.5 rounded flex items-center gap-1">
              <i data-lucide="${icon}" class="w-3 h-3"></i> ${typeLabel}
            </span>
            ${item.date ? `<span class="text-zinc-600 text-[10px] font-bold uppercase tracking-widest">${new Date(item.date).toLocaleDateString('en-US', { month: 'short', year: 'numeric' })}</span>` : ''}
          </div>
          <h3 class="text-xl font-bold text-zinc-100 group-hover:text-white transition-colors mb-2">${title}</h3>
          <p class="text-zinc-400 text-sm line-clamp-2 leading-relaxed">${content}</p>
        </a>
      `;
    }).join('');
    
    if (window.lucide) window.lucide.createIcons();
  }

  window.addEventListener('keydown', (e) => {
    if (e.key === 'Escape') {
      searchInput.value = '';
      searchInput.dispatchEvent(new Event('input'));
    }
  });
});
</script>
{{ end }}
