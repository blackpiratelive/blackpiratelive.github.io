baseURL = 'https://blackpiratex.com'
defaultContentLanguage = 'en-us'
locale = 'en-us'
title = 'BlackPirateX'
theme = 'mosaic'

[menus]
  [[menus.main]]
    name = 'Home'
    pageRef = '/'
    weight = 10

  [[menus.main]]
    name = 'Thoughts'
    pageRef = '/thoughts'
    weight = 10

  [[menus.main]]
    name = 'Blog'
    pageRef = '/blog'
    weight = 20

  [[menus.main]]
    name = 'Gallery'
    pageRef = '/gallery'
    weight = 20

  [[menus.main]]
    name = 'Book Notes'
    pageRef = '/books'
    weight = 20

  [[menus.main]]
    name = 'About'
    pageRef = '/about'
    weight = 15

[outputs]
  home = ["HTML", "RSS", "ATOM", "JSON"]
  section = ["HTML", "RSS", "ATOM"]
  taxonomy = ["HTML", "RSS", "ATOM"]
  term = ["HTML", "RSS", "ATOM"]

[mediaTypes]
  [mediaTypes."application/atom+xml"]
    suffixes = ["xml"]

[outputFormats]
  [outputFormats.ATOM]
    mediaType = "application/atom+xml"
    baseName = "atom"
    isPlainText = false

[markup]
  [markup.goldmark]
    [markup.goldmark.renderer]
      unsafe = true
    [markup.goldmark.extensions]
      footnote = true

[security]
  enableInlineShortcodes = false
  allowContent = ['^text/html$', '^text/markdown$']
